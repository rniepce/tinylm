<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLM Hub — All Models</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #09090f;
            --bg2: #111118;
            --bg3: #1a1a28;
            --card: #15152a;
            --surface: #1e1e38;
            --border: rgba(255, 255, 255, .06);
            --glow: rgba(99, 102, 241, .3);
            --text: #e8e8f0;
            --text2: #8b8ba0;
            --text3: #5a5a72;
            --accent: #6366f1;
            --accent2: #818cf8;
            --green: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            z-index: 10
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px
        }

        .logo {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 4px 20px rgba(99, 102, 241, .3)
        }

        .header-title h1 {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -.02em
        }

        .header-title span {
            font-size: 12px;
            color: var(--text2)
        }

        /* Model selector */
        .model-select {
            display: flex;
            gap: 6px;
            align-items: center
        }

        .model-btn {
            padding: 7px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text2);
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            transition: all .2s;
            white-space: nowrap
        }

        .model-btn:hover {
            border-color: var(--glow);
            color: var(--text)
        }

        .model-btn.active {
            background: linear-gradient(135deg, var(--accent), #4f46e5);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 2px 12px rgba(99, 102, 241, .3)
        }

        .model-btn.loading {
            opacity: .5;
            pointer-events: none
        }

        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 100px;
            background: rgba(16, 185, 129, .12);
            border: 1px solid rgba(16, 185, 129, .2);
            font-size: 11px;
            color: var(--green)
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            animation: blink 2s ease-in-out infinite
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .4
            }
        }

        /* Chat */
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            scroll-behavior: smooth
        }

        .chat::-webkit-scrollbar {
            width: 5px
        }

        .chat::-webkit-scrollbar-thumb {
            background: var(--text3);
            border-radius: 3px
        }

        .msgs {
            max-width: 820px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 18px
        }

        /* Welcome */
        .welcome {
            text-align: center;
            padding: 48px 20px 32px;
            animation: fadeUp .5s ease-out
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .welcome-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            border-radius: 18px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 8px 32px rgba(99, 102, 241, .25)
        }

        .welcome h2 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: -.02em
        }

        .welcome p {
            color: var(--text2);
            font-size: 13px;
            max-width: 460px;
            margin: 0 auto 24px;
            line-height: 1.6
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center
        }

        .suggestion {
            padding: 9px 16px;
            border-radius: 10px;
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text2);
            font-size: 12px;
            cursor: pointer;
            transition: all .2s;
            font-family: inherit
        }

        .suggestion:hover {
            background: var(--surface);
            border-color: var(--glow);
            color: var(--text);
            transform: translateY(-1px)
        }

        /* Messages */
        .msg {
            display: flex;
            gap: 10px;
            animation: fadeUp .3s ease-out
        }

        .msg.user {
            flex-direction: row-reverse
        }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            flex-shrink: 0;
            margin-top: 2px
        }

        .msg.bot .avatar {
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            box-shadow: 0 2px 10px rgba(99, 102, 241, .2)
        }

        .msg.user .avatar {
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text2)
        }

        .bubble {
            max-width: 700px;
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 13.5px;
            line-height: 1.65;
            overflow-wrap: break-word;
            white-space: pre-wrap
        }

        .msg.user .bubble {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: #fff;
            border-bottom-right-radius: 4px
        }

        .msg.bot .bubble {
            background: var(--surface);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px
        }

        .meta {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            padding-top: 7px;
            border-top: 1px solid rgba(255, 255, 255, .05);
            font-size: 10px;
            color: var(--text3);
            font-family: 'JetBrains Mono', monospace
        }

        /* Typing */
        .typing {
            display: flex;
            gap: 4px;
            padding: 6px 0
        }

        .typing span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent2);
            animation: typAnim 1.4s ease-in-out infinite
        }

        .typing span:nth-child(2) {
            animation-delay: .15s
        }

        .typing span:nth-child(3) {
            animation-delay: .3s
        }

        @keyframes typAnim {

            0%,
            60%,
            100% {
                opacity: .3;
                transform: scale(.85)
            }

            30% {
                opacity: 1;
                transform: scale(1)
            }
        }

        /* Input */
        .input-area {
            padding: 14px 24px 20px;
            background: var(--bg2);
            border-top: 1px solid var(--border)
        }

        .input-wrap {
            max-width: 820px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
            align-items: flex-end
        }

        textarea {
            flex: 1;
            padding: 12px 16px;
            border-radius: 13px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 13.5px;
            resize: none;
            outline: none;
            min-height: 46px;
            max-height: 150px;
            line-height: 1.5;
            transition: border .2s, box-shadow .2s
        }

        textarea::placeholder {
            color: var(--text3)
        }

        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, .12)
        }

        .send {
            width: 46px;
            height: 46px;
            border-radius: 13px;
            border: none;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .2s;
            flex-shrink: 0
        }

        .send:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 4px 16px rgba(99, 102, 241, .35)
        }

        .send:disabled {
            opacity: .4;
            cursor: not-allowed
        }

        .send svg {
            width: 18px;
            height: 18px
        }

        /* Settings */
        .settings-toggle {
            background: none;
            border: 1px solid var(--border);
            border-radius: 9px;
            padding: 7px 9px;
            cursor: pointer;
            color: var(--text2);
            display: flex;
            align-items: center;
            transition: all .2s
        }

        .settings-toggle:hover {
            border-color: var(--glow);
            color: var(--text)
        }

        .settings {
            display: none;
            max-width: 820px;
            margin: 0 auto 10px;
            padding: 14px 18px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            animation: fadeUp .2s
        }

        .settings.open {
            display: block
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 14px
        }

        .setting label {
            display: block;
            font-size: 10px;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: .06em;
            margin-bottom: 5px;
            font-weight: 500
        }

        .setting input[type=range] {
            width: 100%;
            accent-color: var(--accent)
        }

        .sval {
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent2);
            float: right;
            margin-top: -16px
        }

        .footer {
            text-align: center;
            font-size: 10px;
            color: var(--text3);
            padding-top: 8px
        }

        .footer a {
            color: var(--accent2);
            text-decoration: none
        }

        @media(max-width:640px) {
            .header {
                padding: 10px 14px;
                flex-wrap: wrap;
                gap: 8px
            }

            .model-select {
                order: 3;
                width: 100%;
                overflow-x: auto
            }

            .chat {
                padding: 14px
            }

            .input-area {
                padding: 10px 14px 14px
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="header-left">
            <div class="logo">🧠</div>
            <div class="header-title">
                <h1>SLM Hub</h1>
                <span id="model-desc">Loading...</span>
            </div>
        </div>
        <div class="model-select" id="model-select"></div>
        <div style="display:flex;gap:6px;align-items:center">
            <div class="status">
                <div class="status-dot"></div>Online
            </div>
            <button class="settings-toggle" onclick="document.getElementById('settings').classList.toggle('open')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3" />
                    <path
                        d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9c.26.604.852.997 1.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" />
                </svg>
            </button>
        </div>
    </div>

    <div class="chat" id="chat">
        <div class="msgs" id="msgs">
            <div class="welcome" id="welcome">
                <div class="welcome-icon" id="welcome-icon">📚</div>
                <h2 id="welcome-title">SLM Specialist</h2>
                <p id="welcome-desc">Select a specialist model above and start chatting. Each model is fine-tuned for a
                    specific domain.</p>
                <div class="suggestions" id="suggestions"></div>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="settings" id="settings">
            <div class="settings-grid">
                <div class="setting"><label>Temperature <span class="sval" id="tv">0.7</span></label><input type="range"
                        min="0.1" max="2" step="0.1" value="0.7" id="temperature"
                        oninput="$('tv').textContent=this.value"></div>
                <div class="setting"><label>Top-P <span class="sval" id="tpv">0.9</span></label><input type="range"
                        min="0.1" max="1" step="0.05" value="0.9" id="top_p" oninput="$('tpv').textContent=this.value">
                </div>
                <div class="setting"><label>Max Tokens <span class="sval" id="mtv">512</span></label><input type="range"
                        min="64" max="2048" step="64" value="512" id="max_tokens"
                        oninput="$('mtv').textContent=this.value"></div>
                <div class="setting"><label>Rep. Penalty <span class="sval" id="rpv">1.1</span></label><input
                        type="range" min="1" max="1.5" step="0.05" value="1.1" id="rep_pen"
                        oninput="$('rpv').textContent=this.value"></div>
            </div>
        </div>
        <div class="input-wrap">
            <textarea id="input" placeholder="Type your message..." rows="1" onkeydown="handleKey(event)"
                oninput="autoResize(this)"></textarea>
            <button class="send" id="send-btn" onclick="send()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13" />
                    <polygon points="22 2 15 22 11 13 2 9 22 2" />
                </svg>
            </button>
        </div>
        <div class="footer">SLM Hub • MLX QLoRA + PyTorch • Apple Silicon Native • <a
                href="https://github.com/rniepce/tinylm" target="_blank">GitHub</a></div>
    </div>

    <script>
        const $ = id => document.getElementById(id);
        const msgsEl = $('msgs'), chatEl = $('chat'), inputEl = $('input'), sendBtn = $('send-btn');
        let busy = false, activeModel = '';

        const SUGGESTIONS = {
            literature: ['Analyze the symbolism in The Great Gatsby', 'Compare Shakespearean and Petrarchan sonnets', 'What makes Hemingway\'s prose style distinctive?', 'Discuss unreliable narration in Lolita'],
            juridico: ['Elabore um despacho de citação', 'Redija uma sentença de improcedência', 'Analise o art. 485 do CPC', 'Qual o prazo para contestação no procedimento comum?'],
            'data-analyst': ['Write a SQL query to find top customers by revenue', 'Explain the difference between LEFT JOIN and INNER JOIN', 'How to handle missing data in pandas?', 'Calculate a rolling 7-day average in SQL'],
            'code-assistant': ['Write a Python decorator for caching', 'Refactor this function to be more readable', 'Debug this async JavaScript code', 'Explain the SOLID principles with examples'],
            tinylm: ['A história do Brasil', 'O que é a capoeira?', 'Fale sobre a culinária brasileira', 'A Amazônia e sua importância'],
        };
        const ICONS = { literature: '📚', juridico: '⚖️', 'data-analyst': '📊', 'code-assistant': '🧑‍💻', tinylm: '🇧🇷' };

        async function loadModels() {
            try {
                const r = await fetch('/api/models'); const models = await r.json();
                const sel = $('model-select'); sel.innerHTML = '';
                for (const [name, info] of Object.entries(models)) {
                    const b = document.createElement('button');
                    b.className = 'model-btn' + (info.is_active ? ' active' : '');
                    b.textContent = info.display; b.onclick = () => switchModel(name);
                    b.id = 'btn-' + name; sel.appendChild(b);
                    if (info.is_active) setActive(name, info);
                }
            } catch (e) { console.error(e) }
        }

        function setActive(name, info) {
            activeModel = name;
            $('model-desc').textContent = info.description || '';
            $('welcome-icon').textContent = ICONS[name] || '🧠';
            $('welcome-title').textContent = info.display || 'SLM Specialist';
            $('welcome-desc').textContent = info.description || '';
            const sg = $('suggestions'); sg.innerHTML = '';
            (SUGGESTIONS[name] || []).forEach(s => {
                const b = document.createElement('button'); b.className = 'suggestion';
                b.textContent = s; b.onclick = () => useSuggestion(s); sg.appendChild(b);
            });
        }

        async function switchModel(name) {
            if (name === activeModel || busy) return;
            document.querySelectorAll('.model-btn').forEach(b => { b.classList.remove('active'); b.classList.add('loading') });
            const btn = $('btn-' + name); if (btn) btn.classList.add('active');
            try {
                const r = await fetch('/api/switch', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ model: name }) });
                const d = await r.json();
                if (d.status === 'ok' || d.status === 'already_loaded') { setActive(name, d); clearChat() }
            } catch (e) { console.error(e) }
            document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('loading'));
        }

        function clearChat() {
            msgsEl.innerHTML = '';
            const w = document.createElement('div'); w.className = 'welcome'; w.id = 'welcome';
            w.innerHTML = `<div class="welcome-icon" id="welcome-icon">${ICONS[activeModel] || '🧠'}</div><h2 id="welcome-title">${$('welcome-title')?.textContent || ''}</h2><p id="welcome-desc">${$('welcome-desc')?.textContent || ''}</p><div class="suggestions" id="suggestions"></div>`;
            msgsEl.appendChild(w);
            const sg = w.querySelector('#suggestions');
            (SUGGESTIONS[activeModel] || []).forEach(s => { const b = document.createElement('button'); b.className = 'suggestion'; b.textContent = s; b.onclick = () => useSuggestion(s); sg.appendChild(b) });
        }

        function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML }
        function scroll() { chatEl.scrollTop = chatEl.scrollHeight }
        function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 150) + 'px' }
        function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send() } }
        function useSuggestion(t) { inputEl.value = t; autoResize(inputEl); send() }

        function addMsg(role, content, meta = '') {
            const w = $('welcome'); if (w) w.style.display = 'none';
            const d = document.createElement('div'); d.className = 'msg ' + role;
            const av = role === 'user' ? '👤' : (ICONS[activeModel] || '🧠');
            d.innerHTML = `<div class="avatar">${av}</div><div class="bubble">${esc(content)}${meta ? `<div class="meta">${meta}</div>` : ''}</div>`;
            msgsEl.appendChild(d); scroll(); return d;
        }
        function addTyping() {
            const w = $('welcome'); if (w) w.style.display = 'none';
            const d = document.createElement('div'); d.className = 'msg bot'; d.id = 'typing';
            d.innerHTML = `<div class="avatar">${ICONS[activeModel] || '🧠'}</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
            msgsEl.appendChild(d); scroll();
        }

        async function send() {
            const prompt = inputEl.value.trim(); if (!prompt || busy) return;
            busy = true; sendBtn.disabled = true;
            addMsg('user', prompt); inputEl.value = ''; inputEl.style.height = 'auto';
            addTyping();
            const t0 = performance.now();
            try {
                const r = await fetch('/api/generate', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({
                        prompt, max_tokens: +$('max_tokens').value, temperature: +$('temperature').value,
                        top_p: +$('top_p').value, repetition_penalty: +$('rep_pen').value,
                    })
                });
                const d = await r.json();
                const dt = ((performance.now() - t0) / 1000).toFixed(1);
                const el = $('typing'); if (el) el.remove();
                addMsg('bot', d.text || d.error || '(no response)', `⚡ ${dt}s • ${activeModel}`);
            } catch (e) { const el = $('typing'); if (el) el.remove(); addMsg('bot', '❌ Error: ' + e.message) }
            busy = false; sendBtn.disabled = false; inputEl.focus();
        }

        loadModels(); inputEl.focus();
    </script>
</body>

</html>
